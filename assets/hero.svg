<svg width="1000" height="320" viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#11162B"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
      <animate attributeName="x1" values="0;-400;0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1000;1400;1000" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F472B6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
      <animate attributeName="x1" values="-300;200;-300" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="700;1300;700" dur="11s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="280" y1="120" x2="760" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9E4FF"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .name { font: 800 56px 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; letter-spacing: 2px; }
      .sub  { font: 500 19px 'Consolas', 'Courier New', monospace; fill: #9BB4D6; letter-spacing: 3px; }
      .tag  { font: 600 13px 'Consolas', 'Courier New', monospace; letter-spacing: 2px; }
      .reveal { opacity: 0; animation: in 0.6s ease forwards; }
      @keyframes in { to { opacity: 1; } }
      .d1{animation-delay:.15s}.d2{animation-delay:.3s}.d3{animation-delay:.45s}.d4{animation-delay:.6s}
      .d5{animation-delay:.75s}.d6{animation-delay:.9s}.d7{animation-delay:1.05s}.d8{animation-delay:1.2s}
      .float { animation: fl 6s ease-in-out infinite; }
      @keyframes fl { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    </style>
  </defs>

  <rect width="1000" height="320" rx="18" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#26304D" stroke-width="0.5" opacity="0.35">
    <path d="M0 80H1000M0 160H1000M0 240H1000"/>
    <path d="M125 0V320M250 0V320M375 0V320M500 0V320M625 0V320M750 0V320M875 0V320"/>
  </g>

  <!-- aurora ribbons -->
  <path d="M0 220 C 200 150, 380 260, 560 200 S 880 130, 1000 190 V320 H0 Z" fill="url(#aurora1)" opacity="0.5">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M0 220 C 200 150, 380 260, 560 200 S 880 130, 1000 190 V320 H0 Z;
              M0 200 C 220 250, 400 150, 580 220 S 860 240, 1000 170 V320 H0 Z;
              M0 220 C 200 150, 380 260, 560 200 S 880 130, 1000 190 V320 H0 Z"/>
  </path>
  <path d="M0 260 C 250 210, 450 290, 650 240 S 900 200, 1000 250 V320 H0 Z" fill="url(#aurora2)" opacity="0.45">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="M0 260 C 250 210, 450 290, 650 240 S 900 200, 1000 250 V320 H0 Z;
              M0 240 C 260 290, 430 210, 640 270 S 880 250, 1000 220 V320 H0 Z;
              M0 260 C 250 210, 450 290, 650 240 S 900 200, 1000 250 V320 H0 Z"/>
  </path>

  <!-- floating particles -->
  <g fill="#67E8F9">
    <circle cx="90" cy="70" r="2.5" opacity="0.8"><animate attributeName="cy" values="70;50;70" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="90" r="3" opacity="0.7"><animate attributeName="cy" values="90;65;90" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0.15;0.7" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="840" cy="220" r="2" fill="#F472B6" opacity="0.8"><animate attributeName="cy" values="220;200;220" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="240" r="2" fill="#A78BFA" opacity="0.8"><animate attributeName="cy" values="240;215;240" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="48" r="2" fill="#A78BFA" opacity="0.7"><animate attributeName="cy" values="48;30;48" dur="7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- code brackets ornament -->
  <g class="float" filter="url(#glow)">
    <text x="180" y="160" class="name" fill="#8B5CF6" opacity="0.9" font-size="64">&#123;</text>
    <text x="788" y="160" class="name" fill="#22D3EE" opacity="0.9" font-size="64">&#125;</text>
  </g>

  <!-- name: letter groups reveal -->
  <g filter="url(#glow)" text-anchor="middle">
    <text x="318" y="158" class="name reveal d1" fill="url(#nameGrad)">N</text>
    <text x="362" y="158" class="name reveal d2" fill="url(#nameGrad)">G</text>
    <text x="408" y="158" class="name reveal d3" fill="url(#nameGrad)">U</text>
    <text x="452" y="158" class="name reveal d4" fill="url(#nameGrad)">Y</text>
    <text x="494" y="158" class="name reveal d5" fill="url(#nameGrad)">Ễ</text>
    <text x="538" y="158" class="name reveal d6" fill="url(#nameGrad)">N</text>
  </g>
  <g filter="url(#glow)" text-anchor="middle">
    <text x="356" y="218" class="name reveal d4" fill="#E9E4FF" font-size="44">THÀNH</text>
    <text x="560" y="218" class="name reveal d6" fill="#67E8F9" font-size="44">DƯƠNG</text>
  </g>

  <!-- subtitle with blinking cursor -->
  <g class="reveal d8">
    <text x="500" y="262" text-anchor="middle" class="sub">SOFTWARE ENGINEERING STUDENT · JAVA · WEB · DATA</text>
    <rect x="838" y="248" width="9" height="16" fill="#22D3EE">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- top tags -->
  <g class="reveal d7">
    <rect x="40" y="32" rx="11" width="150" height="24" fill="#8B5CF6" opacity="0.14" stroke="#8B5CF6" stroke-opacity="0.5"/>
    <text x="115" y="48" text-anchor="middle" class="tag" fill="#C4B5FD">PHENIKAA UNIV</text>
    <rect x="812" y="32" rx="11" width="148" height="24" fill="#22D3EE" opacity="0.12" stroke="#22D3EE" stroke-opacity="0.5"/>
    <text x="886" y="48" text-anchor="middle" class="tag" fill="#67E8F9">HANOI · VIETNAM</text>
  </g>
</svg>
